sections:
  - type: cards
    heading: What is included
    items:
      - title: On-time attendance
        body: A vetted local proxy attends the apartment viewing on your behalf.
      - title: Checklist and observations
        body: The proxy completes a structured checklist and records important observations.
      - title: Photographs
        body: Reports include photographs.
      - title: Four-hour report
        body: The report is delivered within four hours.
  - type: cards
    heading: Cancellations and refunds
    items:
      - title: More than 24 hours
        body: Full refund.
      - title: Within 24 hours but more than 2 hours
        body: 50% fee.
      - title: Within 2 hours
        body: No refund.
      - title: If Proxies fails to deliver
        body: Full refund.
  - type: callout
    heading: No report, no charge
    body: If no report is delivered on time, you are not charged.
