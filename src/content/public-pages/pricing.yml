hero:
  eyebrow: Pricing
  title: Clear price, clear charging.
  body: The customer price is €29.99. Payment is authorised before activation, and charging happens only after successful delivery.
  ctas:
    - label: How it works
      href: /how-it-works
      variant: primary
    - label: FAQ
      href: /faq
