sections:
  - type: steps
    heading: Seeker journey
    items:
      - title: Enter the apartment address
        body: Address autocomplete is the primary entry point. Do not ask users to choose a district first.
      - title: Provide viewing details
        body: Collect the viewing date, viewing time, optional meeting point, and optional additional instructions.
      - title: Select priorities
        body: Customers may specify up to three things they especially want checked.
      - title: Authorise payment
        body: A payment method is authorised before activation. Charging happens only after successful delivery.
      - title: Confirm next steps
        body: Explain what happens next, the report deadline, the cancellation policy, and that no report means no charge.
  - type: cards
    heading: Proxy assignment
    items:
      - title: Identity verification
        body: Identity verification is required before accepting jobs.
      - title: Same-time notification
        body: Eligible proxies receive a viewing notification simultaneously.
      - title: First to confirm
        body: The first eligible proxy who confirms receives the assignment.
      - title: Document handover
        body: The proxy can hand over documents at the viewing.
